# =============================================================================
# snmpd.conf — SNMP Simulator for Out-of-Band Management (OBM) Testing
# =============================================================================
# Simulates a network device / server BMC with comprehensive monitoring OIDs
# Compatible with H3C/HH3C SNMP templates used in this Zabbix deployment
# =============================================================================

# -----------------------------------------------------------------------------
# Access Control
# -----------------------------------------------------------------------------
# SNMPv2c community strings
com2sec  AllUser    default    public
com2sec  AllUser    default    h3c_community

group    AllGroup   v1         AllUser
group    AllGroup   v2c        AllUser

view     AllView    included   .1

access   AllGroup   ""  any  noauth  exact  AllView  AllView  AllView

# SNMPv3 user for testing (authPriv)
# username: zabbixuser, auth: SHA/myauthpass, priv: AES128/myprivpass
createUser  zabbixuser  SHA  myauthpass  AES  myprivpass
rwuser      zabbixuser  priv

# -----------------------------------------------------------------------------
# System MIB (SNMPv2-MIB)  —  OID: 1.3.6.1.2.1.1
# -----------------------------------------------------------------------------
# sysDescr.0  (1.3.6.1.2.1.1.1.0)
sysDescr    H3C Simulated Switch SR8800-X Series, Version 7.1.075, Release 6328 - Simulated OBM Device for Zabbix Testing

# sysObjectID.0  (1.3.6.1.2.1.1.2.0)
sysObjectID .1.3.6.1.4.1.25506.11.1.136

# sysContact.0  (1.3.6.1.2.1.1.4.0)
sysContact  NOC Team <noc@example.com> +86-10-12345678

# sysName.0  (1.3.6.1.2.1.1.5.0)
sysName     H3C-OBM-SIM-01

# sysLocation.0  (1.3.6.1.2.1.1.6.0)
sysLocation DC-Beijing-Rack42-U15 (Simulated)

# sysServices.0  (1.3.6.1.2.1.1.7.0)
sysServices 76



# -----------------------------------------------------------------------------
# Interface Configuration (IF-MIB)  —  OID: 1.3.6.1.2.1.2
# -----------------------------------------------------------------------------
# The container's real network interfaces will be exposed automatically.
# Additionally, we define virtual interfaces via 'interface' directives
# to simulate a multi-port switch for LLD testing.

# Force inclusion of all interfaces
interface_replace_old yes



# -----------------------------------------------------------------------------
# Disk / Storage monitoring (HOST-RESOURCES-MIB)
# hrSystemUptime — OID: 1.3.6.1.2.1.25.1.1.0
# Automatically provided by snmpd from host uptime
# -----------------------------------------------------------------------------
includeAllDisks 10%

# -----------------------------------------------------------------------------
# Extend Scripts — Simulate hardware sensor data
# These are accessible under NET-SNMP-EXTEND-MIB
# OID: 1.3.6.1.4.1.8072.1.3.2
# -----------------------------------------------------------------------------

# CPU utilization (simulated percentage)
extend cpu-usage     /usr/local/bin/snmpd-extend.sh cpu_usage
# Memory utilization (simulated percentage)
extend mem-usage     /usr/local/bin/snmpd-extend.sh mem_usage
# Temperature sensor (simulated °C)
extend temperature   /usr/local/bin/snmpd-extend.sh temperature
# Fan speed (simulated RPM)
extend fan-speed     /usr/local/bin/snmpd-extend.sh fan_speed
# Power supply status
extend psu-status    /usr/local/bin/snmpd-extend.sh psu_status
# Overall hardware health
extend hw-health     /usr/local/bin/snmpd-extend.sh hw_health

# -----------------------------------------------------------------------------
# Pass-through OIDs — HH3C-ENTITY-EXT-MIB Simulation
# OID: 1.3.6.1.4.1.25506 (H3C/HH3C enterprise OID)
# -----------------------------------------------------------------------------
# These simulate the H3C private MIB tree that Zabbix H3C templates query.
#
# hh3cEntityExtMIB base: 1.3.6.1.4.1.25506.2.6.1.1.1
#   .1.6.{index}  = hh3cEntityExtCpuUsage       (CPU %)
#   .1.8.{index}  = hh3cEntityExtMemUsage        (Memory %)
#   .1.12.{index} = hh3cEntityExtTemperature     (Temperature °C)
#   .1.19.{index} = hh3cEntityExtErrorStatus      (0=normal)
#
# Entity physical table (entPhysicalTable) for discovery:
#   1.3.6.1.2.1.47.1.1.1.1.7.{index} = entPhysicalName
#
# Using `pass` (one-shot) instead of `pass_persist` for container reliability.
# Each SNMP request spawns the handler, which outputs OID\ntype\nvalue.

pass .1.3.6.1.4.1.25506  /usr/local/bin/snmp_pass_h3c.sh
pass .1.3.6.1.2.1.47     /usr/local/bin/snmp_pass_entity.sh

# -----------------------------------------------------------------------------
# Process Monitoring
# Monitor snmpd itself and common system daemons
# -----------------------------------------------------------------------------
proc snmpd

# -----------------------------------------------------------------------------
# Load Average Thresholds
# 1-min, 5-min, 15-min
# -----------------------------------------------------------------------------
load 4.0 3.0 2.0

# -----------------------------------------------------------------------------
# AgentX — Sub-agent support (disabled in container)
# -----------------------------------------------------------------------------
# master  agentx
# agentXSocket /var/run/net-snmp/agentx

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# Log to stderr so Docker can capture it
# Levels: 0=emerg .. 7=debug
dontLogTCPWrappersConnects yes



# -----------------------------------------------------------------------------
# Trap / Inform Sink (optional — for testing trap forwarding)
# Send traps to the Zabbix SNMP Trapper if present
# -----------------------------------------------------------------------------
# Uncomment below if zabbix-snmptraps container is running:
# trap2sink    zabbix-snmptraps:162  public
# informsink   zabbix-snmptraps:162  public

# Generate authentication failure traps
authtrapenable 1

# coldStart trap — disabled by default to avoid startup errors
# trapsink localhost:162 public

# -----------------------------------------------------------------------------
# Engine ID (unique for this simulated device)
# -----------------------------------------------------------------------------
engineID 0x80001f880456789abcdef01234
