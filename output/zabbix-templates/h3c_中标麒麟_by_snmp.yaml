zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0099638a6e38449e807d7b0b5de75a0c
      name: 'Templates/Operating systems'
  templates:
    - uuid: dc239b764eeb414685bb221b369ecd90
      template: H3C_ZhongbiaoQilin_by_SNMP
      name: 'H3C 中标麒麟 by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : 中标麒麟
        源模板 ID  : 209760028721403
        华三类型   : kylin
        转换时间   : 2026-03-20 13:05:35
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: c328a702c60d46db98fa2198c8a233a4
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 0cd74bd655ba466799e0036b8f319290
              expression: 'max(/H3C_ZhongbiaoQilin_by_SNMP/icmpping,#3)=0'
              name: 'H3C 中标麒麟 by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: ebea04dd2f85467e9b207d99a6763aa5
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: def99e22e2ba4cf2934d379eba20fe97
              expression: 'min(/H3C_ZhongbiaoQilin_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_ZhongbiaoQilin_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C 中标麒麟 by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C 中标麒麟 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_ZhongbiaoQilin_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: fda25888011a4aaf8ad9d77b91c604f7
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 63eade28ee6243db8af0619e51b8f836
              expression: 'avg(/H3C_ZhongbiaoQilin_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C 中标麒麟 by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C 中标麒麟 by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_ZhongbiaoQilin_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_ZhongbiaoQilin_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C 中标麒麟 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_ZhongbiaoQilin_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 07201789af6f460aaa3f99e99fa5aec3
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: e20aeac45a064f39914e34641de93239
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 5bcfdf0b411a425493f23317de51930d
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: d28ad44997da43a08f48cd124fb19a2e
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: a051aa9401a546c380763de128df257f
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 025ccfe771754d28afb499900a6d861d
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 28b7dfc79a174bd68436b3903d9058a3
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: fc8227a6bad24c5891a75bf4182d0047
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: febc1b0fbf674fc2912ea89d8efce735
              expression: 'max(/H3C_ZhongbiaoQilin_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C 中标麒麟 by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 93744ed34db84e66919e926a48c1b536
          name: 'CPU 总利用率'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2021.11]'
          key: system.cpu.walk
          delay: '300s'
          trends: '0'
          value_type: TEXT
          description: |
            MIB: UCD-SNMP-MIB
            采集系统 CPU 统计原始数据（walk），供 Dependent item 解析。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: a9f7d4410abf4d7692aee06a0fbbe2d6
          name: 'CPU 利用率（用户态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.9.0]'
          key: 'system.cpu.util[,user]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuUser: 用户态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: ebe1e24cb52847c9804281e1b0bcad28
              expression: 'count(/H3C_ZhongbiaoQilin_by_SNMP/system.cpu.util[,user],900s,">=","80")>=3'
              name: 'H3C 中标麒麟 by SNMP: 中标麒麟 CpuUtilization GE 80（HIGH）'
              priority: HIGH
              description: '华三阈值转换：cpu/CpuUtilization GE 80，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
            - uuid: 3199786c052d4d34acda2f18834709b2
              expression: 'count(/H3C_ZhongbiaoQilin_by_SNMP/system.cpu.util[,user],900s,">=","90")>=3'
              name: 'H3C 中标麒麟 by SNMP: 中标麒麟 CpuUtilization GE 90（DISASTER）'
              priority: DISASTER
              description: '华三阈值转换：cpu/CpuUtilization GE 90，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
        - uuid: 5c471ae3d26b4c40af8de0e849eb0611
          name: 'CPU 利用率（系统态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.10.0]'
          key: 'system.cpu.util[,system]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuSystem: 系统态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 823b48b7ba8b419fb3bdeb729f052748
          name: 'CPU 利用率（I/O 等待）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.54.0]'
          key: 'system.cpu.util[,iowait]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuRawWait: I/O 等待 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 50495ebfe64c479badba8feed83ef2e4
          name: 'CPU 负载（1分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.1]'
          key: 'system.cpu.load[all,avg1]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.1: 1 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: de9171e888ac4248aea19494ecfef5be
          name: 'CPU 负载（5分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.2]'
          key: 'system.cpu.load[all,avg5]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.2: 5 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: bdb7bbffe8d44f599c41dad3a4e33326
          name: 'CPU 负载（15分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.3]'
          key: 'system.cpu.load[all,avg15]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.3: 15 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 151b3c6d2f754c8da98af53560f1dd34
          name: 内存总量
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.5.0]'
          key: 'vm.memory.total[memTotalReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalReal: 物理内存总量（KB，Zabbix 自动换算 B）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 0b49c6dd9de9481894b54abe46e7521d
          name: 可用内存
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.11.0]'
          key: 'vm.memory.free[memAvailReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailReal: 可用物理内存（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 04e36e851f4141228553dd7e706e1b45
          name: 内存利用率
          type: CALCULATED
          key: 'vm.memory.util[snmp]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          params: '100*(last(//vm.memory.total[memTotalReal.0])-last(//vm.memory.free[memAvailReal.0]))/last(//vm.memory.total[memTotalReal.0])'
          description: '根据 memTotalReal / memAvailReal 计算内存利用率（%）。'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 2fd9e1dd30564732be5b7646853b7b11
          name: 'Swap 总量'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.3.0]'
          key: 'system.swap.size[,total]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalSwap: Swap 总量（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 17bea5ffc21f466ca4004ed22afcf18a
          name: 'Swap 剩余'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.4.0]'
          key: 'system.swap.size[,free]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailSwap: Swap 剩余（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: 3211f4f138994100a8b73ea5ae6b95f2
          name: 'Filesystem discovery (SNMP)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.25.3.8]'
          key: 'vfs.fs.discovery[snmp]'
          delay: '1h'
          description: |
            MIB: HOST-RESOURCES-MIB
            发现本机存储资源（文件系统）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#FSTYPE}'
                value: 'hrStorageFixedDisk'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#FSNAME}'
              path: $.name
            - lld_macro: '{#FSTYPE}'
              path: $.type
          item_prototypes:
            - uuid: 172c54ee9daa4a02948ad87455a65510
              name: 'Filesystem {#FSNAME}: 总空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}]'
              key: 'vfs.fs.total[dskTotal.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageSize: 文件系统总分配块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 2adb0879f5124db6bdcacba3c945e817
              name: 'Filesystem {#FSNAME}: 已用空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}]'
              key: 'vfs.fs.used[dskUsed.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageUsed: 已使用块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: d94ac0fe91e440bb832b1cdd4f3ba4a9
              name: 'Filesystem {#FSNAME}: 利用率'
              type: CALCULATED
              key: 'vfs.fs.pused[{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              params: '100*last(//vfs.fs.used[dskUsed.{#SNMPINDEX}])/last(//vfs.fs.total[dskTotal.{#SNMPINDEX}])'
              description: '文件系统使用率（%）。'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
        - uuid: 02fd9fd83b9b47c38b5f1ffc04002ee9
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: c08db01cb56f4bce8219f71f745cd98c
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 82b6f9cfc7c8448cad97e82100928546
              name: 'Interface {#IFDESCR}: 出流量'
              type: SNMP_AGENT
