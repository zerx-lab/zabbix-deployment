zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0099638a6e38449e807d7b0b5de75a0c
      name: 'Templates/Operating systems'
  templates:
    - uuid: 59757771fe83412eab845571c4c89401
      template: H3C_NingsiPanshi_by_SNMP
      name: 'H3C 凝思磐石 by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : 凝思磐石
        源模板 ID  : 209760028721413
        华三类型   : rocky
        转换时间   : 2026-03-20 13:05:36
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: c497daf147414202ab677f0154febd98
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 91c57174e92948e9b3c47daf31376f6e
              expression: 'max(/H3C_NingsiPanshi_by_SNMP/icmpping,#3)=0'
              name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 834081fdb0f645f09ecfa8c456890f58
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 89fc7b7f151c4b2eb7c07a9e14de2af6
              expression: 'min(/H3C_NingsiPanshi_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_NingsiPanshi_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C 凝思磐石 by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_NingsiPanshi_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 24a83c62013b422b87475d36234700cc
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 9210f07f25ca44eeabbfb9cde756f825
              expression: 'avg(/H3C_NingsiPanshi_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C 凝思磐石 by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C 凝思磐石 by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_NingsiPanshi_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_NingsiPanshi_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_NingsiPanshi_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: bc930cc0b7694eb082689368052b6c02
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: 014fcba6da634980825a3048cf907909
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: f9668377f9a147dd9dc29f4008476282
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 102d8fa9584d47b2b8aba885184eeeda
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: eac3dc0fe89947c185041c8f7ff43be5
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 044ef1c122f44a1ba0b3a30de1bbeed3
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 9f96f64b7e774a81a8881ee6bfcd73e7
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: bff544740dfb416a848e115a3e5aa512
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 67f0780cbfcb484fac7038c0110a5a74
              expression: 'max(/H3C_NingsiPanshi_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C 凝思磐石 by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 5562a31ead264747b94a965837ba0f93
          name: 'CPU 总利用率'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2021.11]'
          key: system.cpu.walk
          delay: '300s'
          trends: '0'
          value_type: TEXT
          description: |
            MIB: UCD-SNMP-MIB
            采集系统 CPU 统计原始数据（walk），供 Dependent item 解析。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: e46370d82a4b47b2b95c66a342264f32
          name: 'CPU 利用率（用户态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.9.0]'
          key: 'system.cpu.util[,user]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuUser: 用户态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: c00e9d60bc994b2b837d07e8ef6f6716
              expression: 'count(/H3C_NingsiPanshi_by_SNMP/system.cpu.util[,user],900s,">=","80")>=3'
              name: 'H3C 凝思磐石 by SNMP: 凝思磐石 CpuUtilization GE 80（HIGH）'
              priority: HIGH
              description: '华三阈值转换：cpu/CpuUtilization GE 80，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
            - uuid: 8f25ded4ac184e2d99143be3d9e844fa
              expression: 'count(/H3C_NingsiPanshi_by_SNMP/system.cpu.util[,user],900s,">=","90")>=3'
              name: 'H3C 凝思磐石 by SNMP: 凝思磐石 CpuUtilization GE 90（DISASTER）'
              priority: DISASTER
              description: '华三阈值转换：cpu/CpuUtilization GE 90，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
        - uuid: fa122c016016472d8408626ff758d77c
          name: 'CPU 利用率（系统态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.10.0]'
          key: 'system.cpu.util[,system]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuSystem: 系统态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 4a7b1a61bcf148b78a642cb8f8ee9f75
          name: 'CPU 利用率（I/O 等待）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.54.0]'
          key: 'system.cpu.util[,iowait]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuRawWait: I/O 等待 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: bef875a554d343349f7f231139849db4
          name: 'CPU 负载（1分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.1]'
          key: 'system.cpu.load[all,avg1]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.1: 1 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: a5aabc79f4694eb5922bfd1ec8cad055
          name: 'CPU 负载（5分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.2]'
          key: 'system.cpu.load[all,avg5]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.2: 5 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: af6bf042e2cd4b6bba62f34f8f405956
          name: 'CPU 负载（15分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.3]'
          key: 'system.cpu.load[all,avg15]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.3: 15 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 1773cb2b74074606942090bba9e24bcf
          name: 内存总量
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.5.0]'
          key: 'vm.memory.total[memTotalReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalReal: 物理内存总量（KB，Zabbix 自动换算 B）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 397605d0876f4f26b19c90ebf76d9cf1
          name: 可用内存
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.11.0]'
          key: 'vm.memory.free[memAvailReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailReal: 可用物理内存（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 19d1b1e0dc6448a580b20adf97947f26
          name: 内存利用率
          type: CALCULATED
          key: 'vm.memory.util[snmp]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          params: '100*(last(//vm.memory.total[memTotalReal.0])-last(//vm.memory.free[memAvailReal.0]))/last(//vm.memory.total[memTotalReal.0])'
          description: '根据 memTotalReal / memAvailReal 计算内存利用率（%）。'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 442c9d75c7e14e7e945b2f0a3d66fdab
          name: 'Swap 总量'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.3.0]'
          key: 'system.swap.size[,total]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalSwap: Swap 总量（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 90b363561d5a4e5ba0851e5bad997f8c
          name: 'Swap 剩余'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.4.0]'
          key: 'system.swap.size[,free]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailSwap: Swap 剩余（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: e208cbf5e7e44ebebae23a6f3d5c96fe
          name: 'Filesystem discovery (SNMP)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.25.3.8]'
          key: 'vfs.fs.discovery[snmp]'
          delay: '1h'
          description: |
            MIB: HOST-RESOURCES-MIB
            发现本机存储资源（文件系统）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#FSTYPE}'
                value: 'hrStorageFixedDisk'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#FSNAME}'
              path: $.name
            - lld_macro: '{#FSTYPE}'
              path: $.type
          item_prototypes:
            - uuid: fcc703d434954ad7ad17cb6028c18dd0
              name: 'Filesystem {#FSNAME}: 总空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}]'
              key: 'vfs.fs.total[dskTotal.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageSize: 文件系统总分配块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 5afe4fcc373446b1b0e9579fb3803d86
              name: 'Filesystem {#FSNAME}: 已用空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}]'
              key: 'vfs.fs.used[dskUsed.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageUsed: 已使用块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 8ca18820d8b948069628ae241e88ed95
              name: 'Filesystem {#FSNAME}: 利用率'
              type: CALCULATED
              key: 'vfs.fs.pused[{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              params: '100*last(//vfs.fs.used[dskUsed.{#SNMPINDEX}])/last(//vfs.fs.total[dskTotal.{#SNMPINDEX}])'
              description: '文件系统使用率（%）。'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
        - uuid: 22b197c629544303bdbe5a3a2ec5cd6c
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: abb5f906f1da416199d6c7006be9edf2
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 01ef8d8e03ec4cf9b0cfe9707b161cbe
              name: 'Interface {#IFDESCR}: 出流量'
              type: SNMP_AGENT
