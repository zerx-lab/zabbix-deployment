zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0099638a6e38449e807d7b0b5de75a0c
      name: 'Templates/Operating systems'
  templates:
    - uuid: 1d66c4a138124c4fa044f1dfafca5eae
      template: H3C_SUSE_by_SNMP
      name: 'H3C Suse by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : Suse
        源模板 ID  : 209760028721419
        华三类型   : suse
        转换时间   : 2026-03-20 13:24:57
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: 99b241a36dcc44f2b6d4fd9bf06738ea
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: b63c0cc41a0f4aae909294bbc4112c52
              expression: 'max(/H3C_SUSE_by_SNMP/icmpping,#3)=0'
              name: 'H3C Suse by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 0482c0b1cded4e9ba47db01a23a3a37d
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: ac76eecb906d4d8d8382ba7cf77e5a9f
              expression: 'min(/H3C_SUSE_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_SUSE_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C Suse by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C Suse by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_SUSE_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 7a04e00508b4405482ccc1efc108cefa
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: eac5613c131448178e512791619fcf12
              expression: 'avg(/H3C_SUSE_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C Suse by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C Suse by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_SUSE_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_SUSE_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C Suse by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_SUSE_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 5b6b3fad53694167a3a0c8ac51f34d34
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: 90e6448788ac44c6bc298431492d7b73
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 78ef391200f24c128e0bd2d0b2a665b4
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 48671cbbb9b840fa9e1bbe333049f5a6
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 02c8883469394b929d8c3098f4a6bdd7
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 30c6cd8b82e2441ab25a1db5d6310c07
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 61682a9807824ca987f311a37f03f7d5
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 0d2e3ac578354b6a9e9c4ed814400c38
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 11ff3607bff34ddaa69959f4a991a700
              expression: 'max(/H3C_SUSE_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C Suse by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: e19316db3462443a9e4d1aea771aac45
          name: 'CPU 总利用率'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2021.11]'
          key: system.cpu.walk
          delay: '300s'
          trends: '0'
          value_type: TEXT
          description: |
            MIB: UCD-SNMP-MIB
            采集系统 CPU 统计原始数据（walk），供 Dependent item 解析。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 1e319aa062b446819d9f4f7be74274fc
          name: 'CPU 利用率（用户态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.9.0]'
          key: 'system.cpu.util[,user]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuUser: 用户态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 2cac720d42054c56be4bc857fbae972a
          name: 'CPU 利用率（系统态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.10.0]'
          key: 'system.cpu.util[,system]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuSystem: 系统态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 1b68a3179f364c16bc4901f0560aaeb0
          name: 'CPU 利用率（I/O 等待）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.54.0]'
          key: 'system.cpu.util[,iowait]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuRawWait: I/O 等待 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: edf9d94b037d462b8d6d7c2d8a77481c
          name: 'CPU 负载（1分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.1]'
          key: 'system.cpu.load[all,avg1]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.1: 1 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 6efb07abf41e478f85a21f7e55f9669e
          name: 'CPU 负载（5分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.2]'
          key: 'system.cpu.load[all,avg5]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.2: 5 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 1e3fce054bb54b69885990557a51f806
          name: 'CPU 负载（15分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.3]'
          key: 'system.cpu.load[all,avg15]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.3: 15 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 1d731c6adef04bd38d0e2d89e4190c1f
          name: 内存总量
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.5.0]'
          key: 'vm.memory.total[memTotalReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalReal: 物理内存总量（KB，Zabbix 自动换算 B）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 92524cb4b3894c44a28a36e71a8d85eb
          name: 可用内存
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.11.0]'
          key: 'vm.memory.free[memAvailReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailReal: 可用物理内存（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 2b0264cef738436b9a46b829e74be543
          name: 内存利用率
          type: CALCULATED
          key: 'vm.memory.util[snmp]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          params: '100*(last(//vm.memory.total[memTotalReal.0])-last(//vm.memory.free[memAvailReal.0]))/last(//vm.memory.total[memTotalReal.0])'
          description: '根据 memTotalReal / memAvailReal 计算内存利用率（%）。'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: a8e9fead90854b4eb7e908a0b336d3a7
          name: 'Swap 总量'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.3.0]'
          key: 'system.swap.size[,total]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalSwap: Swap 总量（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: a74ca3208dbc42feaadebacc870cb530
          name: 'Swap 剩余'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.4.0]'
          key: 'system.swap.size[,free]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailSwap: Swap 剩余（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: b3f7b15bfde94cafaf1be5f97c34866b
          name: 'Filesystem discovery (SNMP)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.25.3.8]'
          key: 'vfs.fs.discovery[snmp]'
          delay: '1h'
          description: |
            MIB: HOST-RESOURCES-MIB
            发现本机存储资源（文件系统）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#FSTYPE}'
                value: 'hrStorageFixedDisk'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#FSNAME}'
              path: $.name
            - lld_macro: '{#FSTYPE}'
              path: $.type
          item_prototypes:
            - uuid: 0784c1268ed94c94acd44efb552a9996
              name: 'Filesystem {#FSNAME}: 总空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}]'
              key: 'vfs.fs.total[dskTotal.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageSize: 文件系统总分配块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 969e27d5fb8f46f08f19febd26abf25b
              name: 'Filesystem {#FSNAME}: 已用空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}]'
              key: 'vfs.fs.used[dskUsed.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageUsed: 已使用块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 995f0937b7224ab7888b7452f89e3e96
              name: 'Filesystem {#FSNAME}: 利用率'
              type: CALCULATED
              key: 'vfs.fs.pused[{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              params: '100*last(//vfs.fs.used[dskUsed.{#SNMPINDEX}])/last(//vfs.fs.total[dskTotal.{#SNMPINDEX}])'
              description: '文件系统使用率（%）。'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
        - uuid: 27cae15672b8468580aff67c506f6e44
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: 3eda2509fa8e4338abd6fa12f021a047
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: d33462f435f04b709baeb7436012f0e7
              name: 'Interface {#IFDESCR}: 出流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}]'
              key: 'net.if.out[ifHCOutOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCOutOctets: 接口出方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: d3bb338bf440422da156a326906ce6c9
              name: 'Interface {#IFDESCR}: 入错误'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}]'
              key: 'net.if.in.errors[ifInErrors.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: IF-MIB
                ifInErrors: 接口入方向错误包数。
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
