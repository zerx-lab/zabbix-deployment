zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 447617281b0a48f8b80532f48c7bb624
      name: 'Templates/Network devices'
  templates:
    - uuid: d4a7bd92f81846778a4f5b1171916104
      template: H3C_BROCADE_by_SNMP
      name: 'H3C Brocade by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : Brocade
        源模板 ID  : 209760028721473
        华三类型   : brocade
        转换时间   : 2026-03-20 13:24:57
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 7e72941705c144e4b63b6a53288c3bac
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: d4d36b0e97d045fdb7e9bbc47c6526ed
              expression: 'max(/H3C_BROCADE_by_SNMP/icmpping,#3)=0'
              name: 'H3C Brocade by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: be273bfcaf394b169f36ca41245414c5
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: dc10914be1bf4bb8a27b8a0a64ec0774
              expression: 'min(/H3C_BROCADE_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_BROCADE_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C Brocade by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C Brocade by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_BROCADE_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 4322934ebc2740d3a65d62ccea73e005
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 21718cf3ea3e4633a34237bba6bc832d
              expression: 'avg(/H3C_BROCADE_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C Brocade by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C Brocade by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_BROCADE_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_BROCADE_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C Brocade by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_BROCADE_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 6d43217fa8a441c5a528a265a95ae40a
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: f3577aec8ea9445dbe3349ca5cabfdd5
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: d5753ca57fba4f0a864a8edc946075fd
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 6f49f8089fb844468bc5ac76f3a7ea15
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 38b9a3c18c704400aa397c1d3e4cb78b
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 1235096af67a428287c13e024618bb47
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: c389a7e0d263476d8e666f99d41d21b7
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: ced3ff83a55c4bccb44249d766fb838b
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 2dbf568069ca49129cbd163e24e68737
              expression: 'max(/H3C_BROCADE_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C Brocade by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: f8794f510a2240b98cc115729db6f989
          name: 'FC switch: CPU 利用率'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.26.1.0]'
          key: system.cpu.util
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: SW-MIB (Brocade)
            swCpuUsage: 交换机 CPU 利用率（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: a270fbea21724a6f9c48478a53869860
          name: 'FC switch: 内存利用率'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.26.6.0]'
          key: vm.memory.util
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: SW-MIB (Brocade)
            swMemUsage: 内存使用率（%）。
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 2d20aa409112421ab91606070da9f2bc
          name: 'FC switch: 固件版本'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.1.6.0]'
          key: system.sw.version
          delay: '1h'
          trends: '0'
          value_type: CHAR
          description: |
            MIB: SW-MIB
            swFirmwareVersion: Brocade FC 交换机固件版本。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: 672915d0184d45cdabcf0f7b6df04f0a
          name: 'FC port discovery (Brocade)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.1588.2.1.1.1.6.2.1]'
          key: fc.port.discovery
          delay: '1h'
          description: |
            MIB: SW-MIB (Brocade)
            发现 FC 端口列表。
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#PORT_NAME}'
              path: $.name
          item_prototypes:
            - uuid: 4c6b8bca77304e2f82bef61dea9a0d18
              name: 'FC port {#SNMPINDEX}: 入字节数'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.6.2.1.11.{#SNMPINDEX}]'
              key: 'net.if.in[swFCPortRxWords.{#SNMPINDEX}]'
              delay: '3m'
              units: Bps
              description: |
                MIB: SW-MIB
                swFCPortRxWords: FC 端口接收字数（4字节/字）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '4'
              tags:
                - tag: component
                  value: network
                - tag: source
                  value: h3c-converted
            - uuid: 98e95bf197024d20b0e2dccc5f0d9491
              name: 'FC port {#SNMPINDEX}: 出字节数'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.6.2.1.12.{#SNMPINDEX}]'
              key: 'net.if.out[swFCPortTxWords.{#SNMPINDEX}]'
              delay: '3m'
              units: Bps
              description: |
                MIB: SW-MIB
                swFCPortTxWords: FC 端口发送字数。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '4'
              tags:
                - tag: component
                  value: network
                - tag: source
                  value: h3c-converted
            - uuid: c5560c6ba66247f7b171068d74be7ec1
              name: 'FC port {#SNMPINDEX}: 端口状态'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.1588.2.1.1.1.6.2.1.4.{#SNMPINDEX}]'
              key: 'net.if.status[swFCPortOpStatus.{#SNMPINDEX}]'
              delay: '1m'
              description: |
                MIB: SW-MIB
                swFCPortOpStatus: FC 端口运行状态（1=online, 2=offline）。
              valuemap:
                name: 'Brocade::swFCPortOpStatus'
              tags:
                - tag: component
                  value: network
                - tag: source
                  value: h3c-converted
              trigger_prototypes:
                - uuid: 5c3c77f0f7d14259a657d21777dea0ff
                  expression: 'last(/H3C_BROCADE_by_SNMP/net.if.status[swFCPortOpStatus.{#SNMPINDEX}])=2'
                  name: 'FC port {#SNMPINDEX}: 端口 offline'
                  priority: AVERAGE
                  description: 'FC 端口状态变为 offline。'
                  tags:
                    - tag: scope
                      value: availability
      macros:
        - macro: '{$SNMP_COMMUNITY}'
          value: 'public'
          description: 'SNMP community string'
        - macro: '{$SNMP.TIMEOUT}'
          value: '5m'
          description: 'SNMP 连接超时时间'
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'ICMP 丢包率告警阈值（%）'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'ICMP 响应时间告警阈值（秒）'
      tags:
        - tag: source
          value: h3c-converted
        - tag: h3c-type
          value: brocade
      valuemaps:
        - uuid: bd5e3c32c46941a89e09f4f5266d436d
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: 'Down'
            - value: '1'
              newvalue: 'Up'
        - uuid: 63b9783bea594fa1af78d5655359c17c
          name: 'IF-MIB::ifOperStatus'
          mappings:
            - value: '1'
              newvalue: 'up'
            - value: '2'
              newvalue: 'down'
            - value: '3'
              newvalue: 'testing'
            - value: '4'
              newvalue: 'unknown'
            - value: '5'
              newvalue: 'dormant'
            - value: '6'
              newvalue: 'notPresent'
            - value: '7'
              newvalue: 'lowerLayerDown'
        - uuid: d0842c46f56a45b9a9dc1e5838b875a0
          name: zabbix.host.available
          mappings:
            - value: '0'
              newvalue: 'not available'
            - value: '1'
              newvalue: 'available'
            - value: '2'
              newvalue: 'unknown'
        - uuid: f5099229bc8f496ba810b3c5d2974792
          name: 'Brocade::swFCPortOpStatus'
          mappings:
            - value: '1'
              newvalue: 'online'
            - value: '2'
              newvalue: 'offline'
            - value: '3'
              newvalue: 'testing'
            - value: '4'
              newvalue: 'faulty'
