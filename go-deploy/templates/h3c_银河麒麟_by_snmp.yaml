zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0099638a6e38449e807d7b0b5de75a0c
      name: 'Templates/Operating systems'
  templates:
    - uuid: a100b32c61404bb480fc75d9ac3b3441
      template: H3C_YinheQilin_by_SNMP
      name: 'H3C 银河麒麟 by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : 银河麒麟
        源模板 ID  : 209760028721405
        华三类型   : kylinos
        转换时间   : 2026-03-20 13:05:35
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: 0a668f3482384eb2a31f0c7acbef447c
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: bcfa44ab464e4a2a9fcd5953b7771524
              expression: 'max(/H3C_YinheQilin_by_SNMP/icmpping,#3)=0'
              name: 'H3C 银河麒麟 by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: afbbe788b77c4469a594ae07a94ed84f
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 629919a6be7f47fcb9227988c21ac3ae
              expression: 'min(/H3C_YinheQilin_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_YinheQilin_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C 银河麒麟 by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C 银河麒麟 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_YinheQilin_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 41da9171d9894cb8b5325cb30d61b256
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 94fe963f6b3c4be3af049b0ca417a22e
              expression: 'avg(/H3C_YinheQilin_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C 银河麒麟 by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C 银河麒麟 by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_YinheQilin_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_YinheQilin_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C 银河麒麟 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_YinheQilin_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 2107aa34deaa4bf4b4bc856bc5ced38e
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: e22fa6e7190a42f788ced538ad3d797a
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: db468cc4601a47789d9c7a5156e28402
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 90bf479aa8b44fe1b40e2f22458b08ce
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 60c2d9e1b09d41b88e12235ca726e360
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 3600aeea4a32435982aef8f39ffdaa27
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: a05f0a31c0a84c5393563a705a1616e7
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: beadde9a98e84a6aa47292bfd68da137
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: d8a5d81e40fa4dcaac2c00257b90d784
              expression: 'max(/H3C_YinheQilin_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C 银河麒麟 by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 4708971fb3244eecb4b64d02e158299b
          name: 'CPU 总利用率'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2021.11]'
          key: system.cpu.walk
          delay: '300s'
          trends: '0'
          value_type: TEXT
          description: |
            MIB: UCD-SNMP-MIB
            采集系统 CPU 统计原始数据（walk），供 Dependent item 解析。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 4e177a76ec374ce1b69812e01f8a1ec6
          name: 'CPU 利用率（用户态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.9.0]'
          key: 'system.cpu.util[,user]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuUser: 用户态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 21f3cf1cc9fe4bb4afb3d96185f33a63
              expression: 'count(/H3C_YinheQilin_by_SNMP/system.cpu.util[,user],900s,">=","80")>=3'
              name: 'H3C 银河麒麟 by SNMP: 银河麒麟 CpuUtilization GE 80（HIGH）'
              priority: HIGH
              description: '华三阈值转换：cpu/CpuUtilization GE 80，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
            - uuid: 289b5798019743b4b24840a577ec8887
              expression: 'count(/H3C_YinheQilin_by_SNMP/system.cpu.util[,user],900s,">=","90")>=3'
              name: 'H3C 银河麒麟 by SNMP: 银河麒麟 CpuUtilization GE 90（DISASTER）'
              priority: DISASTER
              description: '华三阈值转换：cpu/CpuUtilization GE 90，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
        - uuid: bdffbbe997354e1081d2720266729531
          name: 'CPU 利用率（系统态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.10.0]'
          key: 'system.cpu.util[,system]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuSystem: 系统态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 32da4502d1c8417bbd414c70b2fd3cda
          name: 'CPU 利用率（I/O 等待）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.54.0]'
          key: 'system.cpu.util[,iowait]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuRawWait: I/O 等待 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: b0ae79cb79974405a9d9101706849551
          name: 'CPU 负载（1分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.1]'
          key: 'system.cpu.load[all,avg1]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.1: 1 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 0bb5a595c40142779984158ee68716bb
          name: 'CPU 负载（5分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.2]'
          key: 'system.cpu.load[all,avg5]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.2: 5 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: a9472dc6b3c34c1180a81dc44ebf4cb0
          name: 'CPU 负载（15分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.3]'
          key: 'system.cpu.load[all,avg15]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.3: 15 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: d4436992c13d4d8f94b10067deefd86d
          name: 内存总量
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.5.0]'
          key: 'vm.memory.total[memTotalReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalReal: 物理内存总量（KB，Zabbix 自动换算 B）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: ff53d40c89934caaa6038d82ad5414b1
          name: 可用内存
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.11.0]'
          key: 'vm.memory.free[memAvailReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailReal: 可用物理内存（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: e3af3cfb0c6247ed8ee0683f8471c6b7
          name: 内存利用率
          type: CALCULATED
          key: 'vm.memory.util[snmp]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          params: '100*(last(//vm.memory.total[memTotalReal.0])-last(//vm.memory.free[memAvailReal.0]))/last(//vm.memory.total[memTotalReal.0])'
          description: '根据 memTotalReal / memAvailReal 计算内存利用率（%）。'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 61cb9095976c4f159d3d558b9e51e876
          name: 'Swap 总量'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.3.0]'
          key: 'system.swap.size[,total]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalSwap: Swap 总量（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 144c817269574c5f8f998223af2da6f3
          name: 'Swap 剩余'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.4.0]'
          key: 'system.swap.size[,free]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailSwap: Swap 剩余（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: 623d4539e7ef4c708fe5cd58d205292d
          name: 'Filesystem discovery (SNMP)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.25.3.8]'
          key: 'vfs.fs.discovery[snmp]'
          delay: '1h'
          description: |
            MIB: HOST-RESOURCES-MIB
            发现本机存储资源（文件系统）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#FSTYPE}'
                value: 'hrStorageFixedDisk'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#FSNAME}'
              path: $.name
            - lld_macro: '{#FSTYPE}'
              path: $.type
          item_prototypes:
            - uuid: 4f1478316057410c9f4291930d3daa16
              name: 'Filesystem {#FSNAME}: 总空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}]'
              key: 'vfs.fs.total[dskTotal.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageSize: 文件系统总分配块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 49ebd324532b4db38d84e9bfaed131b0
              name: 'Filesystem {#FSNAME}: 已用空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}]'
              key: 'vfs.fs.used[dskUsed.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageUsed: 已使用块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 3a7ba3ed87af431fa6d51fa118b6db1f
              name: 'Filesystem {#FSNAME}: 利用率'
              type: CALCULATED
              key: 'vfs.fs.pused[{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              params: '100*last(//vfs.fs.used[dskUsed.{#SNMPINDEX}])/last(//vfs.fs.total[dskTotal.{#SNMPINDEX}])'
              description: '文件系统使用率（%）。'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
        - uuid: 1504e1f964e5472bba628ede814cd74b
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: 7c593ee6b4a143e1addc8fa46725407e
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 58f2a7d447ac45f681f6fe6b05399280
              name: 'Interface {#IFDESCR}: 出流量'
