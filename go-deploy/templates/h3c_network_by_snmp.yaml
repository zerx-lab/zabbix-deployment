zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 447617281b0a48f8b80532f48c7bb624
      name: 'Templates/Network devices'
  templates:
    - uuid: d4fdecb249804a2fa1cec7acf8d5ae49
      template: H3C_NETWORK_by_SNMP
      name: 'H3C 网络设备 by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : 网络设备
        源模板 ID  : 209760028721155
        华三类型   : network
        转换时间   : 2026-03-20 13:24:56
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: a10ca2f3e31d4d3a9460032a4b32f1a0
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '1m'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: afa75a865eee4d6d8c1e974f6bf5d08b
              expression: 'max(/H3C_NETWORK_by_SNMP/icmpping,#3)=0'
              name: 'H3C 网络设备 by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 80d586077d544d72b8feda577e483d65
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 098b07b1522b4e1282e637cb3e39922d
              expression: 'min(/H3C_NETWORK_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_NETWORK_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C 网络设备 by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C 网络设备 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_NETWORK_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: acf562c5aae2499ba7a08487b40106af
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 162999c6d21747d68932146b2b4f8306
              expression: 'avg(/H3C_NETWORK_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C 网络设备 by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C 网络设备 by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_NETWORK_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_NETWORK_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C 网络设备 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_NETWORK_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 8eef915409164869a738e6d00ca9c2ac
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: 9f164286af0540b6a6e2199dc44650e7
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 609696d872114e9e8da8e7e056521f1e
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 1d8aee9be8c549bebf6c70b654037363
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 83a8237bb8ff456297a4fe39528ab8f7
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: b2ff141da3af4e5caf255fc76d68a01b
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 074c3a9f6835433fb7c7fafd8c34a1cc
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: f95af67a1b0743229388f88551891b2e
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 4b6ba6cb002f4aa89a00ee1115e92344
              expression: 'max(/H3C_NETWORK_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C 网络设备 by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 1fce997614c5485bad6844b507544427
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: dd44ef5de2134e3eaa156bfba81127a1
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 1f5a12b1c89b49c79173f0731acdaa3a
              name: 'Interface {#IFDESCR}: 出流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}]'
              key: 'net.if.out[ifHCOutOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCOutOctets: 接口出方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 36c0b19c40754c2c90b13327d505b366
              name: 'Interface {#IFDESCR}: 入错误'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}]'
              key: 'net.if.in.errors[ifInErrors.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: IF-MIB
                ifInErrors: 接口入方向错误包数。
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: f05fbbfcfa1f43908a310261dd758d77
              name: 'Interface {#IFDESCR}: 出错误'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}]'
              key: 'net.if.out.errors[ifOutErrors.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: IF-MIB
                ifOutErrors: 接口出方向错误包数。
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 4e8614658b0444c294bede28a6647e29
              name: 'Interface {#IFDESCR}: 入丢包'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}]'
              key: 'net.if.in.discards[ifInDiscards.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: IF-MIB
                ifInDiscards: 接口入方向丢弃包数。
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 5a29d35a4eef4f149c63592698712043
              name: 'Interface {#IFDESCR}: 出丢包'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}]'
              key: 'net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: IF-MIB
                ifOutDiscards: 接口出方向丢弃包数。
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: 499911b70a8d4d8695061598148d1878
              name: 'Interface {#IFDESCR}: 速率'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}]'
              key: 'net.if.speed[ifHighSpeed.{#SNMPINDEX}]'
              delay: '5m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHighSpeed: 接口额定速率（Mbps 转 bps）。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: b9f3f64278ff4b14818059726160f78a
              name: 'Interface {#IFDESCR}: 运行状态'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}]'
              key: 'net.if.status[ifOperStatus.{#SNMPINDEX}]'
              delay: '1m'
              description: |
                MIB: IF-MIB
                ifOperStatus: 接口当前运行状态（1=up, 2=down, 3=testing）。
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
              trigger_prototypes:
                - uuid: b1e743b805b646b7894e26114d1f5bc5
                  expression: 'last(/H3C_NETWORK_by_SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2'
                  name: 'Interface {#IFDESCR}: 接口链路 down'
                  priority: AVERAGE
                  description: '接口运行状态变为 down。'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: interface
                      value: '{#IFDESCR}'
        - uuid: b129ceb32f1245e38cb9932ab910218d
          name: 'Entity discovery (HH3C MIB)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.25506.2.6.1.1.1]'
          key: entity.discovery
          delay: '1h'
          description: |
            MIB: HH3C-ENTITY-EXT-MIB
            发现 H3C 设备实体（模块/CPU/内存等）。
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#ENT_NAME}'
              path: $.name
          item_prototypes:
            - uuid: 25e87d4020934ee386ce0556edec54fd
              name: 'Entity {#ENT_NAME}: CPU 利用率'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.25506.2.6.1.1.1.1.6.{#SNMPINDEX}]'
              key: 'system.cpu.util[hh3cEntityExtCpuUsage.{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              description: |
                MIB: HH3C-ENTITY-EXT-MIB
                hh3cEntityExtCpuUsage: 实体 CPU 利用率（%）。
              tags:
                - tag: component
                  value: cpu
                - tag: source
                  value: h3c-converted
              trigger_prototypes:
                - uuid: 83c56f5c85b142be824812104f00d341
                  expression: 'count(/H3C_NETWORK_by_SNMP/system.cpu.util[hh3cEntityExtCpuUsage.{#SNMPINDEX}],900s,"ge","70")>=3'
                  name: '{TEMPLATE_NAME}: 网络设备 cpuUtilization GE 70（AVERAGE）'
                  priority: AVERAGE
                  description: '华三阈值转换：cpu/cpuUtilization GE 70，持续 3 次（每次 300s）。'
                  tags:
                    - tag: scope
                      value: performance
                - uuid: 426efd5eae234152bfc8a8527d0a3bd8
                  expression: 'count(/H3C_NETWORK_by_SNMP/system.cpu.util[hh3cEntityExtCpuUsage.{#SNMPINDEX}],900s,"ge","90")>=3'
                  name: '{TEMPLATE_NAME}: 网络设备 cpuUtilization GE 90（HIGH）'
                  priority: HIGH
                  description: '华三阈值转换：cpu/cpuUtilization GE 90，持续 3 次（每次 300s）。'
                  tags:
                    - tag: scope
                      value: performance
            - uuid: d7091972f9bc4b4faa55cfea517b1c5f
              name: 'Entity {#ENT_NAME}: 内存利用率'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.25506.2.6.1.1.1.1.8.{#SNMPINDEX}]'
              key: 'vm.memory.util[hh3cEntityExtMemUsage.{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              description: |
                MIB: HH3C-ENTITY-EXT-MIB
                hh3cEntityExtMemUsage: 实体内存利用率（%）。
              tags:
                - tag: component
                  value: memory
                - tag: source
                  value: h3c-converted
            - uuid: 7b99868b52054fb7903747b0b7eda141
              name: 'Entity {#ENT_NAME}: 温度'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.25506.2.6.1.1.1.1.12.{#SNMPINDEX}]'
              key: 'sensor.temp.value[hh3cEntityExtTemperature.{#SNMPINDEX}]'
              delay: '3m'
              value_type: FLOAT
              units: °C
              description: |
                MIB: HH3C-ENTITY-EXT-MIB
                hh3cEntityExtTemperature: 实体温度（℃）。
              tags:
                - tag: component
                  value: temperature
                - tag: source
                  value: h3c-converted
            - uuid: d7654cda0169452ab17ca60783924b80
              name: 'Entity {#ENT_NAME}: 错误状态'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.25506.2.6.1.1.1.1.19.{#SNMPINDEX}]'
              key: 'sensor.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}]'
              delay: '3m'
              description: |
                MIB: HH3C-ENTITY-EXT-MIB
                hh3cEntityExtErrorStatus: 实体错误状态（0=正常）。
              tags:
                - tag: component
                  value: hardware
                - tag: source
                  value: h3c-converted
              trigger_prototypes:
                - uuid: b8b227aab83c4cfc95cb09278baea1f0
                  expression: 'last(/H3C_NETWORK_by_SNMP/sensor.status[hh3cEntityExtErrorStatus.{#SNMPINDEX}])<>0'
                  name: 'Entity {#ENT_NAME}: 硬件故障'
                  priority: AVERAGE
                  description: 实体报告硬件错误，请检查设备状态。
                  tags:
                    - tag: scope
                      value: availability
      macros:
        - macro: '{$SNMP_COMMUNITY}'
          value: 'public'
          description: 'SNMP community string'
        - macro: '{$SNMP.TIMEOUT}'
          value: '5m'
          description: 'SNMP 连接超时时间'
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'ICMP 丢包率告警阈值（%）'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'ICMP 响应时间告警阈值（秒）'
        - macro: '{$TEMP_WARN}'
          value: '60'
          description: 温度告警阈值（℃）
        - macro: '{$TEMP_CRIT}'
          value: '80'
          description: 温度严重告警阈值（℃）
      tags:
        - tag: source
          value: h3c-converted
        - tag: h3c-type
          value: network
      valuemaps:
        - uuid: ba018af6955a4d53bcb04763e9fc4428
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: 'Down'
            - value: '1'
              newvalue: 'Up'
        - uuid: c276c60ec59943bab9a86488cc88c7da
          name: 'IF-MIB::ifOperStatus'
          mappings:
            - value: '1'
