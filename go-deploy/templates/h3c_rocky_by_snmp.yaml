zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0099638a6e38449e807d7b0b5de75a0c
      name: 'Templates/Operating systems'
  templates:
    - uuid: 77c66505652341909d135a4cf1b83f23
      template: H3C_ROCKY_by_SNMP
      name: 'H3C 凝思磐石 by SNMP'
      description: |
        华三监控模板转换（H3C → Zabbix 7.0 SNMP）
        源模板名称 : 凝思磐石
        源模板 ID  : 209760028721413
        华三类型   : rocky
        转换时间   : 2026-03-20 13:24:57
        生成工具   : convert_snmp_templates.py
      groups:
        - name: 'Templates/Operating systems'
      items:
        - uuid: 823c47eb79974dcd8ae52c06354fc9d0
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60s'
          description: '设备 ICMP ping 可达性。0=不可达，1=可达。'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 46178e7a589548178a6bc38afbebd0e1
              expression: 'max(/H3C_ROCKY_by_SNMP/icmpping,#3)=0'
              name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
              priority: HIGH
              description: '连续 3 次 ICMP ping 超时，请检查设备连通性。'
              tags:
                - tag: scope
                  value: availability
        - uuid: 8a4df7af3af44ab29730017f626ebfca
          name: 'ICMP ping loss'
          type: SIMPLE
          key: icmppingloss
          delay: '1m'
          value_type: FLOAT
          units: '%'
          description: 'ICMP ping 丢包率。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 74207775f46d43ea93f6a752c9fdad11
              expression: 'min(/H3C_ROCKY_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_ROCKY_by_SNMP/icmppingloss,5m)<100'
              name: 'H3C 凝思磐石 by SNMP: ICMP ping 丢包率过高'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '检测到 ICMP 丢包。'
              dependencies:
                - name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_ROCKY_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 166336f8215e4b5eb1dda630072e30c1
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '1m'
          value_type: FLOAT
          units: s
          description: 'ICMP ping 响应时间（秒）。'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 3d1e7af1824b4807bcf6b49dc3924cbf
              expression: 'avg(/H3C_ROCKY_by_SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'H3C 凝思磐石 by SNMP: ICMP ping 响应时间过高'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: '平均 ICMP 响应时间过高。'
              dependencies:
                - name: 'H3C 凝思磐石 by SNMP: ICMP ping 丢包率过高'
                  expression: 'min(/H3C_ROCKY_by_SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/H3C_ROCKY_by_SNMP/icmppingloss,5m)<100'
                - name: 'H3C 凝思磐石 by SNMP: 设备 ICMP ping 不可达'
                  expression: 'max(/H3C_ROCKY_by_SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: ee0f904ca9fd485ca800e0ab3d243548
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          trends: '0'
          value_type: LOG
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          description: '用于收集所有未被其他 snmptrap item 匹配的 SNMP trap。'
          tags:
            - tag: component
              value: network
            - tag: source
              value: h3c-converted
        - uuid: b0c9a98d64aa46da8642ec27a17d2052
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: NAME
          description: |
            MIB: SNMPv2-MIB
            系统管理员分配的节点名称（sysName）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 5e0508800759476c82fd1bed381152e8
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: OS
          description: |
            MIB: SNMPv2-MIB
            实体文本描述，包含硬件型号、OS 版本及网络软件版本（sysDescr）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: e6a09c42561e44839eb3c420cfbdb385
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: CONTACT
          description: |
            MIB: SNMPv2-MIB
            该节点联系人及联系方式（sysContact）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 8409079b847a4449a45f2eee9127ba62
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: '15m'
          trends: '0'
          value_type: CHAR
          inventory_link: LOCATION
          description: |
            MIB: SNMPv2-MIB
            节点物理位置（sysLocation）。
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '12h'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: aa110d9882434dde92b6ded0b8b489f6
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            网管部分自上次初始化后的运行时间（sysUpTime，单位：百分之一秒）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 051b32096177427ebdcad4cc749e5ca0
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: '30s'
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            主机自上次初始化后的运行时间（hrSystemUptime，单位：百分之一秒）。
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
            - tag: source
              value: h3c-converted
        - uuid: 71d39530be3f43d6b086ec0761fe157c
          name: 'SNMP availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          delay: '1m'
          description: 'Zabbix 内部 item，记录 SNMP 接口可用状态。'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 552cb2469577410094c7a4f96904f8e4
              expression: 'max(/H3C_ROCKY_by_SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'H3C 凝思磐石 by SNMP: SNMP agent 不可达'
              priority: WARNING
              description: '在 {$SNMP.TIMEOUT} 时间内 SNMP agent 没有响应。'
              tags:
                - tag: scope
                  value: availability
        - uuid: e2585c270a5d4974a4ac6d9daa66d73d
          name: 'CPU 总利用率'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.2021.11]'
          key: system.cpu.walk
          delay: '300s'
          trends: '0'
          value_type: TEXT
          description: |
            MIB: UCD-SNMP-MIB
            采集系统 CPU 统计原始数据（walk），供 Dependent item 解析。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: ea200e2869304afcad6857f79d36a59f
          name: 'CPU 利用率（用户态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.9.0]'
          key: 'system.cpu.util[,user]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuUser: 用户态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
          triggers:
            - uuid: 904751d86e68401eb130caf6bd15cfe0
              expression: 'count(/H3C_ROCKY_by_SNMP/system.cpu.util[,user],900s,"ge","80")>=3'
              name: 'H3C 凝思磐石 by SNMP: 凝思磐石 CpuUtilization GE 80（HIGH）'
              priority: HIGH
              description: '华三阈值转换：cpu/CpuUtilization GE 80，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
            - uuid: 111af5ed578644d09a29d562540f35b8
              expression: 'count(/H3C_ROCKY_by_SNMP/system.cpu.util[,user],900s,"ge","90")>=3'
              name: 'H3C 凝思磐石 by SNMP: 凝思磐石 CpuUtilization GE 90（DISASTER）'
              priority: DISASTER
              description: '华三阈值转换：cpu/CpuUtilization GE 90，持续 3 次（每次 300s）。'
              tags:
                - tag: scope
                  value: performance
        - uuid: 71ec914d6e1a4ddd8a97a57b789f639d
          name: 'CPU 利用率（系统态）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.10.0]'
          key: 'system.cpu.util[,system]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuSystem: 系统态 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 9a298efb41324104b7a1a1fc0a462043
          name: 'CPU 利用率（I/O 等待）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.11.54.0]'
          key: 'system.cpu.util[,iowait]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: UCD-SNMP-MIB
            ssCpuRawWait: I/O 等待 CPU 占比（%）。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 06113e3a102d4ceab2e6f4e86ef985f6
          name: 'CPU 负载（1分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.1]'
          key: 'system.cpu.load[all,avg1]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.1: 1 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 3b5cfef2fefc48dea994d9322474e233
          name: 'CPU 负载（5分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.2]'
          key: 'system.cpu.load[all,avg5]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.2: 5 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 7e6b5b1132a7438abe368da3682232ee
          name: 'CPU 负载（15分钟）'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.10.1.3.3]'
          key: 'system.cpu.load[all,avg15]'
          delay: '300s'
          value_type: FLOAT
          description: |
            MIB: UCD-SNMP-MIB
            laLoad.3: 15 分钟平均负载。
          tags:
            - tag: component
              value: cpu
            - tag: source
              value: h3c-converted
        - uuid: 831ba242db774dc3879913be8be80acf
          name: 内存总量
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.5.0]'
          key: 'vm.memory.total[memTotalReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalReal: 物理内存总量（KB，Zabbix 自动换算 B）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 6529b77410154555a5c4faaab9702bc0
          name: 可用内存
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.11.0]'
          key: 'vm.memory.free[memAvailReal.0]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailReal: 可用物理内存（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: ab1e1d99ddea41eb855c32e8d19e2d19
          name: 内存利用率
          type: CALCULATED
          key: 'vm.memory.util[snmp]'
          delay: '300s'
          value_type: FLOAT
          units: '%'
          params: '100*(last(//vm.memory.total[memTotalReal.0])-last(//vm.memory.free[memAvailReal.0]))/last(//vm.memory.total[memTotalReal.0])'
          description: '根据 memTotalReal / memAvailReal 计算内存利用率（%）。'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 99112f7ba234498c943fb73648ec106f
          name: 'Swap 总量'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.3.0]'
          key: 'system.swap.size[,total]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memTotalSwap: Swap 总量（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
        - uuid: 463581185fb1488984c07aadb31f5c04
          name: 'Swap 剩余'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.2021.4.4.0]'
          key: 'system.swap.size[,free]'
          delay: '300s'
          units: B
          description: |
            MIB: UCD-SNMP-MIB
            memAvailSwap: Swap 剩余（KB）。
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
            - tag: source
              value: h3c-converted
      discovery_rules:
        - uuid: cb0d1cc577d54d54bbe91b80c4c5e9cf
          name: 'Filesystem discovery (SNMP)'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.25.3.8]'
          key: 'vfs.fs.discovery[snmp]'
          delay: '1h'
          description: |
            MIB: HOST-RESOURCES-MIB
            发现本机存储资源（文件系统）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#FSTYPE}'
                value: 'hrStorageFixedDisk'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
            - lld_macro: '{#FSNAME}'
              path: $.name
            - lld_macro: '{#FSTYPE}'
              path: $.type
          item_prototypes:
            - uuid: 30428bdffb34428bb0de1feed3192921
              name: 'Filesystem {#FSNAME}: 总空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}]'
              key: 'vfs.fs.total[dskTotal.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageSize: 文件系统总分配块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 1ff07ba7d7124f519d63788e18ef5586
              name: 'Filesystem {#FSNAME}: 已用空间'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}]'
              key: 'vfs.fs.used[dskUsed.{#SNMPINDEX}]'
              delay: '1m'
              units: B
              description: |
                MIB: HOST-RESOURCES-MIB
                hrStorageUsed: 已使用块数 × AllocationUnits。
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#ALLOC_UNITS}'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
            - uuid: 26fe6b634df148f79f8e7ac9d90fbc3d
              name: 'Filesystem {#FSNAME}: 利用率'
              type: CALCULATED
              key: 'vfs.fs.pused[{#SNMPINDEX}]'
              delay: '1m'
              value_type: FLOAT
              units: '%'
              params: '100*last(//vfs.fs.used[dskUsed.{#SNMPINDEX}])/last(//vfs.fs.total[dskTotal.{#SNMPINDEX}])'
              description: '文件系统使用率（%）。'
              tags:
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: h3c-converted
        - uuid: ca96d8b1cf0d411a9012d72e5e551bc3
          name: 'Network interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2]'
          key: net.if.discovery
          delay: '1h'
          description: |
            MIB: IF-MIB
            发现所有网络接口（ifTable）。
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '1'
                operator: MATCHES_REGEX
                formulaid: A
          lld_macro_paths:
            - lld_macro: '{#IFINDEX}'
              path: $.index
            - lld_macro: '{#IFDESCR}'
              path: $.name
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFALIAS}'
              path: $.alias
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#IFADMINSTATUS}'
              path: $.admin_status
            - lld_macro: '{#SNMPINDEX}'
              path: $.index
          item_prototypes:
            - uuid: 56a6b017a06e4db2a82894aa44ce8137
              name: 'Interface {#IFDESCR}: 入流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}]'
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              delay: '3m'
              units: bps
              description: |
                MIB: IF-MIB
                ifHCInOctets: 接口入方向字节数（64 位计数器）。
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFDESCR}'
                - tag: source
                  value: h3c-converted
            - uuid: d2d11d0aca354e9b89176770be8cbd5c
              name: 'Interface {#IFDESCR}: 出流量'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}]'
